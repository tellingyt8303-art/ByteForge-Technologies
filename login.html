<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Log In — ByteForge Technologies</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-head">
      <a href="index.html" class="logo">ByteForge <span>Technologies</span></a>
      <h1 style="font-family:var(--mono);font-size:22px;margin-top:22px">Welcome back</h1>
      <p style="color:var(--muted);font-size:14px;margin-top:6px">Log in to your account</p>
    </div>

    <form id="loginForm" class="card">
      <div class="form-group">
        <label class="form-label">EMAIL</label>
        <input type="email" class="form-input" id="email" placeholder="you@email.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">PASSWORD</label>
        <input type="password" class="form-input" id="password" placeholder="Your password" required/>
      </div>
      <button type="submit" class="btn btn-solid btn-block" id="loginBtn">Log In</button>
      <div class="form-error" id="formError"></div>

      <div class="divider">or</div>
      <button type="button" class="btn btn-outline btn-block" id="googleBtn">Continue with Google</button>
    </form>

    <div class="auth-foot">Don't have an account? <a href="signup.html">Sign up</a></div>
  </div>
</div>

<script type="module">
  import { initLogin } from "./auth.js";
  initLogin();
</script>
</body>
</html>
